name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: EAS Build & Submit to Google Play
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore google-services.json
        run: printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Restore keystore
        run: printf '%s' "$RELEASE_KEYSTORE_B64" | base64 --decode > nexuscore-rn-release.jks
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}

      - name: Write credentials.json
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "nexuscore-rn-release.jks",
                "keystorePassword": "$RELEASE_STORE_PASSWORD",
                "keyAlias": "$RELEASE_KEY_ALIAS",
                "keyPassword": "$RELEASE_KEY_PASSWORD"
              }
            }
          }
          EOF
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upsert GOOGLE_SERVICES_JSON EAS secret file
        run: |
          # --value for --type file must be a file path, not inline content.
          eas env:update \
            --variable-name GOOGLE_SERVICES_JSON \
            --variable-environment production \
            --value ./google-services.json \
            --non-interactive 2>/dev/null || \
          eas env:create \
            --name GOOGLE_SERVICES_JSON \
            --type file \
            --visibility secret \
            --environment production \
            --value ./google-services.json \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(git tag -l 'v*' | wc -l | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  →  name=$VERSION_NAME  code=$VERSION_CODE"

      - name: Bump version in app.config.js
        run: |
          # Patch the version and versionCode directly in app.config.js via sed.
          # The config exports a plain object literal — replace the version string
          # and inject a versionCode field into the android block.
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          # Replace version field
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION_NAME\"/" app.config.js
          # Inject or replace versionCode inside the android block
          if grep -q "versionCode:" app.config.js; then
            sed -i "s/versionCode: [0-9]*/versionCode: $VERSION_CODE/" app.config.js
          else
            sed -i "/package: \"me.jakev.rn.nexuscore\"/a\\      versionCode: $VERSION_CODE," app.config.js
          fi

      - name: EAS Build (Android production AAB)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Google Play (Internal Testing)
        run: eas submit --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
