name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  build-android:
    name: EAS Build (Android preview APK)
    runs-on: ubuntu-latest
    needs: [typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore google-services.json
        run: printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Restore keystore
        run: printf '%s' "$RELEASE_KEYSTORE_B64" | base64 --decode > nexuscore-rn-release.jks
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}

      - name: Write credentials.json
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "nexuscore-rn-release.jks",
                "keystorePassword": "$RELEASE_STORE_PASSWORD",
                "keyAlias": "$RELEASE_KEY_ALIAS",
                "keyPassword": "$RELEASE_KEY_PASSWORD"
              }
            }
          }
          EOF
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upsert GOOGLE_SERVICES_JSON EAS secret file
        run: |
          # --value for --type file must be a file path, not inline content.
          eas env:update \
            --variable-name GOOGLE_SERVICES_JSON \
            --variable-environment preview \
            --value ./google-services.json \
            --non-interactive 2>/dev/null || \
          eas env:create \
            --name GOOGLE_SERVICES_JSON \
            --type file \
            --visibility secret \
            --environment preview \
            --value ./google-services.json \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android preview)
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
