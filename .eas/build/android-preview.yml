build:
  name: Android Preview (legacy-peer-deps)
  steps:
    - eas/checkout
    - eas/use_npm_token
    - run:
        name: Install dependencies
        command: npm install --legacy-peer-deps
    - run:
        name: Restore google-services.json from EAS secret
        command: cp "$EAS_SECRET_FILE_GOOGLE_SERVICES_JSON" google-services.json
    - eas/resolve_build_config
    - eas/prebuild
    - eas/configure_eas_update
    - eas/inject_android_credentials
    - eas/configure_android_version
    - eas/run_gradle
    - eas/find_and_upload_build_artifacts
